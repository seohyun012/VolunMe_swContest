############################################
# VolunMe - Application Properties (Public)
# ?? ??/???? .env ? ??
############################################

# --- Server/Encoding ---
server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# --- DataSource: MySQL (AWS RDS / Local / Docker) ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# --- HikariCP ---
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Multipart Upload ---
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=100MB

# --- Static/Uploads ---
app.upload.local-dir=uploads
app.static.base-url=/uploads

# --- OAuth: Kakao ---
kakao.client_id=${KAKAO_CLIENT_ID}
kakao.redirect_uri=${KAKAO_REDIRECT_URI}
app.redirect.base-url=${APP_BASE_URL:http://localhost:8080}

# --- Thymeleaf (dev) ---
spring.thymeleaf.cache=false

# --- Logging ---
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.orm.jdbc.bind=trace

spring.config.import=optional:file:./.env[.properties],optional:file:.env[.properties],optional:file:../.env[.properties]