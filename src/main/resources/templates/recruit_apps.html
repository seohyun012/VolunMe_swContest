<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>지원자 정보</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="_csrf_header" th:content="${_csrf?.headerName}" />
    <meta name="_csrf" th:content="${_csrf?.token}" />

    <!-- Pretendard (웹폰트) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />

    <style>
        :root{
            --bg:#eff1f4; --card:#ffffff; --ink:#111827; --muted:#6b7280; --line:#e5e7eb; --accent:#ff8b2b;
            --accent-weak:#fff5e9; --radius:16px; --shadow:0 1px 2px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.05);
        }
        *{box-sizing:border-box}
        html,body{height:100%}
        /* 전체 폰트를 Pretendard-Medium(500)로 고정 */
        body{
            margin:0;
            background:var(--bg);
            font-family:"Pretendard","Pretendard Variable",-apple-system,system-ui,Segoe UI,Roboto,Noto Sans KR,sans-serif;
            font-weight:500;
            color:var(--ink)
        }

        /* 상단 앱바 */
        .appbar{position:sticky;top:0;z-index:20;background:linear-gradient(#fff,#fff9);backdrop-filter:saturate(180%) blur(8px);border-bottom:1px solid var(--line)}
        .appbar-inner{max-width:720px;margin:0 auto;display:flex;align-items:center;gap:8px;padding:14px}
        .back{appearance:none;border:0;background:transparent;padding:8px;border-radius:10px;cursor:pointer}
        .back:before{content:"";display:inline-block;width:8px;height:8px;border-left:2px solid #111;border-bottom:2px solid #111;transform:rotate(45deg)}
        .title{font-weight:500;font-size:20px;margin-left:6px}

        .wrap{max-width:720px;margin:0 auto;padding:12px 12px 24px}

        /* 카드 프레임 */
        .frame{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:10px}

        /* 리스트 */
        .list{display:flex;flex-direction:column;gap:10px;margin-top:6px}
        /* 프로필 윤곽선 제거 */
        .row{display:flex;align-items:center;justify-content:space-between;background:#fff;border:0;border-radius:18px;padding:10px 12px}
        .lh{display:flex;align-items:center;gap:12px}

        /* 아바타 (주황 테두리) */
        .avatar{width:44px;height:44px;border-radius:50%;background:conic-gradient(from 180deg,var(--accent),var(--accent)) padding-box, #fff border-box;border:2px solid var(--accent);display:grid;place-items:center}
        .avatar:after{content:"";width:22px;height:22px;border-radius:50%;background:#ffd6aa;box-shadow:0 14px 0 0 #ffe9cf, 0 16px 0 0 #ffe9cf}

        .name{font-weight:500; cursor:text}
        .name[contenteditable="true"]{outline:2px solid #fde68a; border-radius:6px; padding:1px 4px;}

        /* 출석/지급 네모 박스 통일 (#D7D7D7) */
        .pill{
            appearance:none;
            border:0;
            background:#D7D7D7;
            color:#111;
            border-radius:10px;
            padding:7px 12px;
            font-weight:500;
            font-size:12px;
            cursor:pointer
        }
        .pill[disabled]{opacity:1;cursor:not-allowed}

        /* 보상 표식도 동일한 네모 박스 스타일로 */
        .reward{
            display:inline-block;
            background:#D7D7D7;
            color:#111;
            border:0;
            border-radius:10px;
            padding:7px 12px;
            font-weight:500;
            font-size:12px;
            margin-right:6px
        }

        .metaTop{display:flex;align-items:center;justify-content:space-between;padding:8px 6px 10px}
        .meta{color:var(--muted);font-size:13px}

        .empty{color:var(--muted);text-align:center;padding:36px 0}

        .actions{display:flex;gap:8px}
        .ghost{border:1px solid var(--line);background:#fff;border-radius:12px;padding:8px 12px;text-decoration:none;color:#111;font-weight:500}
        .primary{border:1px solid #111;background:#111;color:#fff;border-radius:12px;padding:8px 12px;font-weight:500}
    </style>
</head>
<body>
<header class="appbar">
    <div class="appbar-inner">
        <button class="back" onclick="history.back()" aria-label="뒤로"></button>
        <div class="title">지원자 정보</div>
    </div>
</header>

<main class="wrap">
    <section class="frame">
        <div class="metaTop">
            <div class="meta" id="recruitMeta">불러오는 중...</div>
        </div>

        <div id="appList" class="list"></div>
        <div id="empty" class="empty" style="display:none">아직 지원자가 없습니다.</div>
    </section>
</main>

<script th:inline="javascript">
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;
    const csrfToken  = document.querySelector('meta[name="_csrf"]')?.content;
    const applyCsrf = (init={}) => { if(!csrfHeader || !csrfToken) return init; init.headers = init.headers || {}; init.headers[csrfHeader] = csrfToken; return init; };

    // ===== 이름 맵/별칭 =====
    const aliasKey = 'vmNameAliases';
    const loadAliases = () => { try{ return JSON.parse(localStorage.getItem(aliasKey) || '{}'); }catch{ return {}; } };
    const saveAliases = m => localStorage.setItem(aliasKey, JSON.stringify(m));
    let NAME_MAP = {};     // id/username/email -> displayName
    let ALIASES = loadAliases(); // 사용자가 수동 지정한 별칭

    // 한글 우선 후보선택
    function pickReadable(...cands){
        const xs = cands.filter(Boolean).map(String);
        const hangul = xs.find(s => /[가-힣]/.test(s));
        return hangul || xs[0] || '';
    }

    function emailLocalPart(s){
        if(!s) return '';
        const t = String(s);
        return t.includes('@') ? t.split('@')[0] : t;
    }

    // 표기명 선택: alias > NAME_MAP > 객체 내 후보들 > 이메일 로컬 > username > userId > '익명'
    function pickName(a){
        const uid = a?.userId ?? a?.memberId ?? a?.applicantId ?? a?.id ?? null;
        const uname = a?.username || a?.userName || a?.login || null;
        const email = a?.email || a?.member?.email || a?.user?.email || null;

        // alias 우선 (id/username/email 로 조회)
        const alias = ALIASES[String(uid)] || ALIASES[String(uname)] || ALIASES[String(email)];
        if(alias) return alias;

        const fromMap = NAME_MAP[String(uid)] || NAME_MAP[String(uname)] || NAME_MAP[String(email)];
        if(fromMap) return fromMap;

        const within = pickReadable(
            a?.nickname, a?.displayName, a?.name,
            a?.member?.displayName, a?.member?.nickname, a?.member?.name,
            a?.profile?.displayName, a?.profile?.name
        );
        if(within) return within;

        const emailLocal = emailLocalPart(email);
        if(emailLocal) return emailLocal;

        if(uname) return uname;
        if(uid!=null) return `사용자#${uid}`;
        return '익명';
    }

    // ===== 프로필 보강: 후보 배치 엔드포인트를 순차 시도하여 NAME_MAP 구축 =====
    async function buildNameMap(arr){
        NAME_MAP = {}; // reset

        // 수집
        const ids = [...new Set(arr.map(a => a?.userId ?? a?.memberId ?? a?.applicantId ?? a?.id).filter(Boolean))];
        const usernames = [...new Set(arr.map(a => a?.username || a?.userName || a?.login).filter(Boolean))];

        // 시도할 엔드포인트 (배치 우선 → 단건 후순위)
        const batchEndpoints = [
            // 예상: ?ids=1,2,3 형태
            (ids.length ? { u: `/api/members?ids=${ids.join(',')}`, key: 'id' } : null),
            (ids.length ? { u: `/api/users/profiles?ids=${ids.join(',')}`, key: 'id' } : null),
            (ids.length ? { u: `/api/profile/batch?ids=${ids.join(',')}`, key: 'id' } : null),
            // 예상: ?usernames=a,b
            (usernames.length ? { u: `/api/members/search?usernames=${encodeURIComponent(usernames.join(','))}`, key: 'username' } : null),
            (usernames.length ? { u: `/api/users/by-username?names=${encodeURIComponent(usernames.join(','))}`, key: 'username' } : null),
        ].filter(Boolean);

        // 배치 요청 실행
        for(const ep of batchEndpoints){
            try{
                const res = await fetch(ep.u, { credentials:'include' });
                if(!res.ok) continue;
                const ct = res.headers.get('content-type') || '';
                if(!ct.includes('application/json')) continue;
                const data = await res.json();

                const list =
                    Array.isArray(data) ? data :
                        Array.isArray(data.items) ? data.items :
                            Array.isArray(data.content) ? data.content :
                                Array.isArray(data.data) ? data.data : [];

                for(const p of list){
                    const idKey = String(
                        p.id ?? p.userId ?? p.memberId ?? p.uid ?? p[ep.key] ?? ''
                    );
                    const unameKey = String(
                        p.username ?? p.userName ?? p.login ?? ''
                    );
                    const emailKey = String(
                        p.email ?? p.user?.email ?? p.profile?.email ?? ''
                    );

                    const disp = pickReadable(
                        p.displayName, p.nickname, p.name,
                        p.profile?.displayName, p.profile?.name,
                        p.member?.displayName, p.member?.nickname, p.member?.name
                    ) || emailLocalPart(emailKey) || unameKey;

                    if(disp){
                        if(idKey)    NAME_MAP[idKey] = NAME_MAP[idKey] || disp;
                        if(unameKey) NAME_MAP[unameKey] = NAME_MAP[unameKey] || disp;
                        if(emailKey) NAME_MAP[emailKey] = NAME_MAP[emailKey] || disp;
                    }
                }
            }catch(e){ /* 다음 엔드포인트로 */ }
        }

        // 단건 fallback (너무 많으면 생략)
        if(Object.keys(NAME_MAP).length === 0 && ids.length && ids.length <= 20){
            const singles = [`/api/members/`, `/api/users/`, `/api/profile/`];
            for(const id of ids){
                for(const base of singles){
                    try{
                        const res = await fetch(`${base}${id}`, { credentials:'include' });
                        if(!res.ok) continue;
                        const ct = res.headers.get('content-type') || '';
                        if(!ct.includes('application/json')) continue;
                        const p = await res.json();

                        const disp = pickReadable(
                            p.displayName, p.nickname, p.name,
                            p.profile?.displayName, p.profile?.name,
                            p.member?.displayName, p.member?.nickname, p.member?.name
                        ) || emailLocalPart(p.email) || p.username || '';
                        if(disp){
                            NAME_MAP[String(id)] = disp;
                            break;
                        }
                    }catch(_){ }
                }
            }
        }
    }

    // ===== 페이지 로직 =====
    const recruitId = /*[[${recruitId != null ? recruitId : (postId != null ? postId : 0)}]]*/ 0;

    async function loadHeader(){
        const metaWrap = document.querySelector('.metaTop');
        const metaEl   = document.getElementById('recruitMeta');

        try {
            const res = await fetch(`/api/recruits/${recruitId}`, { credentials:'include' });
            const ct  = res.headers.get('content-type') || '';

            // 실패/로그인 필요 → 줄 보이면서 메시지 표시
            if (!res.ok || ct.includes('text/html')) {
                if (metaWrap) metaWrap.style.display = ''; // 보이게
                if (metaEl)   metaEl.textContent =
                    res.url.includes('/login') ? '로그인이 필요합니다.' : '불러오기 실패';
                return;
            }

            // 성공 → 줄 숨김(카테고리/정원/상태 줄 안 보이게)
            const d = await res.json();
            if (metaWrap) metaWrap.style.display = 'none';

            // 기존 상태 처리(마감 버튼 비활성)
            const btn = document.getElementById('applyBtn');
            const statusStr = String(d.status || '').toUpperCase();
            if (btn && statusStr === 'CLOSED') {
                btn.disabled = true;
                btn.textContent = '마감됨';
            }
        } catch (e) {
            console.error(e);
            // 예외 시에도 줄 보이게 + 메시지
            if (metaWrap) metaWrap.style.display = '';
            if (metaEl)   metaEl.textContent = '불러오기 실패';
        }
    }


    async function loadApps(){
        const list  = document.getElementById('appList');
        const empty = document.getElementById('empty');
        list.innerHTML = '';

        try {
            const url = `/api/recruits/${recruitId}/applicants`;
            const res = await fetch(url, { credentials: 'include' });

            const ct = res.headers.get('content-type') || '';
            const text = await res.text();

            if (!res.ok || ct.includes('text/html') || text.trim().startsWith('<')) {
                empty.style.display = '';
                empty.textContent = res.url.includes('/login') ? '로그인이 필요합니다.' : '불러오기 실패';
                return;
            }

            let raw;
            try { raw = JSON.parse(text); }
            catch { empty.style.display = ''; empty.textContent = '불러오기 실패'; return; }

            let arr =
                Array.isArray(raw)          ? raw :
                    Array.isArray(raw.apps)     ? raw.apps :
                        Array.isArray(raw.data)     ? raw.data :
                            Array.isArray(raw.list)     ? raw.list :
                                Array.isArray(raw.content)  ? raw.content : [];

            // id 정규화
            arr = arr.map(x => ({
                ...x,
                id: x.id ?? x.applicationId ?? x.appId ?? x.applicationID ?? x.appID
            }));

            if (arr.length === 0) {
                empty.style.display = '';
                empty.textContent = '아직 지원자가 없습니다.';
                return;
            }

            // 🔸 먼저 이름 맵 구축 시도(배치 API)
            await buildNameMap(arr);

            empty.style.display = 'none';
            arr.forEach(a => list.appendChild(renderItem(a)));
        } catch (e) {
            console.error(e);
            empty.style.display = '';
            empty.textContent = '불러오기 실패';
        }
    }

    function renderItem(a) {
        const row = document.createElement('div');
        row.className = 'row';

        const appId = a?.id ?? a?.applicationId ?? a?.appId ?? null;
        if (!appId) console.warn('appId missing for item:', a);

        row.dataset.appId = String(appId);
        row.setAttribute('data-app-id', String(appId));

        row.innerHTML = `
      <div class="lh">
        <div class="avatar" aria-hidden="true"></div>
        <div>
          <div class="name"></div>
          <div class="meta">${a.status ?? '신청'}</div>
        </div>
      </div>
      <div>
        ${a.rewarded ? '<span class="reward">+5 지급</span>' : ''}
        <button class="pill" data-act="attend">출석체크</button>
      </div>
    `;

        // 이름 표시
        const nameEl = row.querySelector('.name');
        nameEl.textContent = pickName(a);

        // 이름 별칭 편집(더블클릭)
        nameEl.addEventListener('dblclick', () => {
            const uid = a?.userId ?? a?.memberId ?? a?.applicantId ?? a?.id ?? a?.username ?? '';
            const current = nameEl.textContent || '';
            const next = prompt('이 지원자의 표시 이름을 입력하세요', current);
            if(next == null) return;
            const v = next.trim();
            if(!v) return;
            ALIASES[String(uid)] = v;
            saveAliases(ALIASES);
            nameEl.textContent = v;
        });

        const btn = row.querySelector('[data-act="attend"]');

        if (a.attended === true) {
            btn.textContent = '출석됨';
            btn.disabled = true;
        }

        btn.addEventListener('click', async () => {
            const idFromDom = row.getAttribute('data-app-id');
            if (!idFromDom || idFromDom === 'undefined' || idFromDom === 'null') {
                alert('appId 없음');
                return;
            }

            btn.disabled = true;

            try {
                const body = JSON.stringify({ attended: true });
                let init = { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body };
                init = applyCsrf(init);

                const res = await fetch(`/api/recruits/apps/${idFromDom}/attend`, { credentials: 'include', ...init });

                let r = {};
                try { r = await res.json(); } catch {}

                const rewardedApplied = (typeof r.rewardedApplied !== 'undefined') ? r.rewardedApplied : r.rewarded;
                const already = r.message === 'ALREADY_ATTENDED';

                if (res.ok && (r.ok !== false)) {
                    btn.textContent = '출석됨';
                    btn.disabled = true;

                    if ((rewardedApplied === true || already) && !row.querySelector('.reward')) {
                        const chip = document.createElement('span');
                        chip.className = 'reward';
                        chip.textContent = '+5 지급';
                        btn.parentElement.prepend(chip);
                    }
                    return;
                }

                alert(
                    r.message
                    || (res.status === 401 ? '로그인이 필요합니다.'
                        : res.status === 403 ? '권한이 없습니다.'
                            : res.status === 409 ? '시작 시간 이전에는 출석할 수 없습니다.'
                                : '처리 실패')
                );
                btn.disabled = false;

            } catch (err) {
                console.error(err);
                alert('네트워크 오류');
                btn.disabled = false;
            }
        });

        return row;
    }

    async function applyRecruit(){
        const btn = document.getElementById('applyBtn'); if(!btn) return; btn.disabled=true;
        try{
            let init = { method:'POST', headers:{'Content-Type':'application/json'} };
            init = applyCsrf(init);
            const res = await fetch(`/api/recruits/${recruitId}/apply`, { credentials:'include', ...init });
            let data={}; try{ data=await res.json(); }catch(_){}
            if(res.ok && data.ok !== false){
                alert(data.message || '지원이 완료되었습니다.');
                btn.textContent='지원완료'; btn.disabled=true;
                await loadHeader(); await loadApps();
            }else{
                alert((data && data.message) || `지원 처리에 실패했습니다. (HTTP ${res.status})`);
                btn.disabled=false;
            }
        }catch(e){ console.error(e); alert('네트워크 오류'); btn.disabled=false; }
    }

    window.addEventListener('load', async ()=>{
        document.getElementById('applyBtn')?.addEventListener('click', applyRecruit);
        await loadHeader();
        await loadApps();
    });
</script>
</body>
</html>
