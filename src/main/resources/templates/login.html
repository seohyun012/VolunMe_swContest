<!-- templates/login.html -->
<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>로그인</title>

    <style>
        /* 기본 세팅 */
        * { box-sizing: border-box; }
        html, body {
            height: 100%;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
            "Noto Sans KR", "Apple SD Gothic Neo", Arial, "Helvetica Neue", sans-serif;
            background: #eef0f3;
            color: #222;
        }

        /* 가운데 정렬 */
        .page {
            min-height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* 오렌지 카드 */
        .login-card {
            width: 360px;                  /* 박스 크기 키움 */
            background: #f79e1b;
            border-radius: 20px;
            padding: 28px 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 곰돌이 머리 */
        .bear {
            width: 120px;
            height: 120px;
            object-fit: contain;
            user-select: none;
            -webkit-user-drag: none;
            filter: drop-shadow(0 2px 0 rgba(0,0,0,0.05));
        }

        .title {
            margin: 0;
            font-weight: 700;
            font-size: 22px;
            letter-spacing: -0.2px;
            color: #3b1f00;
        }

        /* 카카오 로그인 버튼 (노란색 알약 버튼) */
        .kakao-btn {
            margin-top: 12px;
            width: 92%;
            height: 48px;
            border: none;
            border-radius: 9999px;
            background: #fee500;
            color: #111;
            font-weight: 700;
            font-size: 15px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: transform 0.05s ease, filter 0.15s ease;
        }
        .kakao-btn:hover { filter: brightness(0.98); }
        .kakao-btn:active { transform: translateY(1px); }

        /* 아이콘은 검은색 톤으로 */
        .kakao-btn .icon {
            width: 20px;
            height: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .kakao-btn .icon svg {
            stroke: #000;
            fill: #000;
        }

        /* 링크가 버튼 영역을 정확히 감싸도록 */
        .btn-link {
            text-decoration: none;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 에러 메시지 */
        .error {
            margin-top: 10px;
            background: #fff3f3;
            color: #b00020;
            border: 1px solid #ffd0d0;
            border-radius: 10px;
            padding: 10px 12px;
            width: 92%;
            font-size: 14px;
            text-align: center;
        }

        /* 작은 화면 대응 */
        @media (max-width: 400px) {
            .login-card { width: 92vw; }
        }
    </style>
</head>
<body>
<div class="page">
    <section class="login-card">
        <!-- 로컬/배포 모두 동작하도록 src + th:src 동시 사용 -->
        <img class="bear"
             src="/img/bearhead.png"
             th:src="@{/img/bearhead.png}"
             alt="곰돌이" />

        <h1 class="title">로그인</h1>

        <!-- 원본의 타임리프 에러 블럭 유지 -->
        <div class="error" th:if="${error}" th:text="${error}">에러 메시지</div>

        <!-- 원본의 로그인 링크 보존: 일반 href + th:href -->
        <a class="btn-link" href="/OAuth2/kakao/login" th:href="@{/OAuth2/kakao/login}">
            <button type="button" class="kakao-btn" aria-label="카카오로 로그인">
          <span class="icon">
            <i data-lucide="message-circle" aria-hidden="true"></i>
          </span>
                카카오톡으로 로그인
            </button>
        </a>
    </section>
</div>

<!-- lucide 아이콘 CDN -->
<script src="https://unpkg.com/lucide@latest"></script>
<script>
    lucide.createIcons();
</script>
</body>
</html>
